<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sentiment Classification</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Sentiment Prediction</h1>
        <input type="text" id="textInput" placeholder="Enter a text...">
        <button onclick="predict()">Predict</button>
        <div class="results-box" style="margin-top: 20px;">
            <p><strong>SVC Model:</strong> <span id="svc-result"></span></p>
            <p><strong>BiLSTM Model:</strong> <span id="lstm-result"></span></p>
        </div>
    </div>
<script>
    async function predict() {
        const text = document.getElementById("textInput").value.trim();
        if (!text) return;

        // Hiển thị trạng thái đang xử lý (vì BiLSTM load hơi lâu)
        document.getElementById("svc-result").textContent = "Loading...";
        document.getElementById("lstm-result").textContent = "Loading...";

        try {
            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text }) 
            });

            const data = await res.json();

            const svcEl = document.getElementById("svc-result");
            const lstmEl = document.getElementById("lstm-result");

            svcEl.textContent = data.svc;
            lstmEl.textContent = data.bilstm;

            svcEl.className = data.svc.toLowerCase();
            lstmEl.className = data.bilstm.toLowerCase();

        } catch (error) {
            console.error("Error:", error);
            alert("Không thể kết nối tới server!");
        }
    }
</script>
</body>
</html>
